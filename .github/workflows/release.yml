name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Archive
        run: |
          xcodebuild archive \
            -project Mochi.xcodeproj \
            -scheme Mochi \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath build/Mochi.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            | xcpretty || true

      - name: Extract app from archive
        run: |
          mkdir -p build/dmg
          cp -R build/Mochi.xcarchive/Products/Applications/Mochi.app build/dmg/

      - name: Ad-hoc sign
        run: |
          codesign --force --deep -s "-" build/dmg/Mochi.app

      - name: Create DMG
        run: |
          # Create a temporary DMG with read-write permissions
          hdiutil create -size 200m -fs HFS+ -volname "Mochi" -ov build/tmp.dmg
          hdiutil attach build/tmp.dmg -mountpoint /Volumes/Mochi

          # Copy app and create Applications symlink
          cp -R build/dmg/Mochi.app /Volumes/Mochi/
          ln -s /Applications /Volumes/Mochi/Applications

          # Unmount and convert to compressed read-only DMG
          hdiutil detach /Volumes/Mochi
          hdiutil convert build/tmp.dmg -format UDZO -o "build/Mochi-${{ steps.version.outputs.version }}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Mochi v${{ steps.version.outputs.version }}
          body: |
            ## Install

            1. Download **Mochi-${{ steps.version.outputs.version }}.dmg** below
            2. Open the DMG and drag **Mochi** to your Applications folder
            3. On first launch, right-click the app and select **Open** (required for unsigned apps)

            > **Note:** Mochi requires macOS 14 (Sonoma) or later on Apple Silicon (M1+).
          files: build/Mochi-${{ steps.version.outputs.version }}.dmg
          draft: false
          prerelease: false
